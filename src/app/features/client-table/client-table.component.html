<div class="page-container">
    <div class="table-header">
        <h1>Clientes</h1>
        <button mat-mini-fab color="primary" (click)="openDialog()">
            <mat-icon>add</mat-icon>
        </button>

    </div>

    <div class="table-container">
        <div class="search-field">
            <mat-icon>search</mat-icon>
            <input [formControl]="searchControl" placeholder="Buscar por nombre...">
        </div>
        <hr>
        
        <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
                <td mat-cell *matCellDef="let client"> {{client.name}} </td>
            </ng-container>

            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let client"> {{client.email}} </td>
            </ng-container>

            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef> Telefono </th>
                <td mat-cell *matCellDef="let client"> {{client.phone}} </td>
            </ng-container>

            <ng-container matColumnDef="dateCreated">
                <th mat-header-cell *matHeaderCellDef> Fecha de alta </th>
                <td mat-cell *matCellDef="let client"> {{client.dateCreated | date:'dd/MM/yyyy'}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedCol"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedCol;" (click)="goToDetails(row)" style="cursor: pointer;"></tr>
        </table>

        <mat-paginator [length]="dataSource.data.length" [pageSize]="10" showFirstLastButtons></mat-paginator>
    </div>
</div>
