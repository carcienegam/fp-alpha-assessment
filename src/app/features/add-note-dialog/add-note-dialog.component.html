<div class="dialog-container">
    <h2>Agregar nota</h2>
    <hr>

    <form [formGroup]="noteForm">
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>Título</mat-label>
            <input matInput formControlName="title" placeholder="Título de la nota">
            @if (noteForm.get('title')?.hasError('required') && noteForm.get('title')?.touched) {
                <mat-error>El título es obligatorio</mat-error>
            }
        </mat-form-field>

        <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>Escribe aquí...</mat-label>
            <textarea matInput formControlName="body" placeholder="Contenido de la nota" rows="4"></textarea>
            @if (noteForm.get('body')?.hasError('required') && noteForm.get('body')?.touched) {
                <mat-error>El contenido es obligatorio</mat-error>
            }
        </mat-form-field>
    </form>

    <mat-dialog-actions align="center">
        <button mat-stroked-button (click)="cancel()">
            <mat-icon>close</mat-icon>
            Cancelar
        </button>
        <button mat-raised-button color="warn" (click)="save()">
            <mat-icon>save</mat-icon>
            Guardar
        </button>
    </mat-dialog-actions>


</div>
